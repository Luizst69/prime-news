<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime News</title>

<style>
body{
margin:0;
font-family:Arial;
background:#e9e9e9;
}

header{
background:linear-gradient(90deg,#8b0000,#d40000);
color:white;
padding:25px;
text-align:center;
}

header h1{
margin:0;
font-size:42px;
}

header p{
margin:5px 0 0 0;
opacity:0.9;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

/* DESTAQUE */
.destaque{
background:white;
border-radius:12px;
padding:15px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.destaque img{
width:100%;
border-radius:10px;
margin-top:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

/* CARD */
.card{
background:white;
padding:18px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
transition:0.2s;
text-align:center;
}

.card:hover{
transform:scale(1.04);
}

.card a{
text-decoration:none;
color:#b30000;
font-weight:bold;
font-size:18px;
}

footer{
text-align:center;
padding:20px;
font-size:12px;
color:#666;
}
</style>

</head>

<body>

<header>
<h1>📰 PRIME NEWS</h1>
<p>Notícias do Brasil e do mundo</p>
</header>

<div class="container">

<div class="destaque">
<h2>🔥 Destaque do dia</h2>

<img src="https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=1000&q=80">

<p>Principais acontecimentos nacionais e internacionais em destaque no portal.</p>
</div>

<div class="grid">

<div class="card"><a href="noticia1.html">🌍 Mundo</a></div>
<div class="card"><a href="noticia2.html">🇧🇷 Brasil</a></div>
<div class="card"><a href="noticia3.html">⚽ Esportes</a></div>
<div class="card"><a href="noticia4.html">💰 Economia</a></div>
<div class="card"><a href="noticia5.html">📱 Tecnologia</a></div>

</div>

</div>

<footer>
© 2026 Prime News
</footer>

</body>
</html>
